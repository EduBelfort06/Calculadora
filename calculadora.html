<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Calculadora</title>

    <link rel="stylesheet" href="estilo.css">
    <script src="calculadora.js" defer></script>
</head>

<body>
    <div class="fundo">
        <header class="titulo-topo">
            <h1>DudsBelfort</h1>
            <h2>Calculadora</h2>
        </header>

        <div class="calculadora">
            <div class="visor">
                <p id="resultado"></p>
            </div>
            <table>
                <tr>
                    <td><button class="btn-op" onclick="limpar()">C</button></td>
                    <td><button class="btn-op" onclick="apagarUltimo()">&lt;</button></td>
                    <td><button class="btn-op" onclick="adicionarValor('/')">/</button></td>
                    <td><button class="btn-op" onclick="adicionarValor('*')">x</button></td>
                </tr>
                <tr>
                    <td><button onclick="adicionarValor('7')">7</button></td>
                    <td><button onclick="adicionarValor('8')">8</button></td>
                    <td><button onclick="adicionarValor('9')">9</button></td>
                    <td><button class="btn-op" onclick="adicionarValor('-')">-</button></td>
                </tr>
                <tr>
                    <td><button onclick="adicionarValor('4')">4</button></td>
                    <td><button onclick="adicionarValor('5')">5</button></td>
                    <td><button onclick="adicionarValor('6')">6</button></td>
                    <td><button class="btn-op" onclick="adicionarValor('+')">+</button></td>
                </tr>
                <tr>
                    <td><button onclick="adicionarValor('1')">1</button></td>
                    <td><button onclick="adicionarValor('2')">2</button></td>
                    <td><button onclick="adicionarValor('3')">3</button></td>
                    <td rowspan="2"><button class="btn-igual" onclick="calcularResultado()">=</button></td>
                </tr>
                <tr>
                    <td colspan="2"><button class="btn-zero" onclick="adicionarValor('0')">0</button></td>
                    <td><button onclick="adicionarValor('.')">.</button></td>
                </tr>
            </table>
        </div>
    </div>
</body>
</html>
